<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dog Watch</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
    <script src="{{ url_for('static', filename='app.js') }}" defer></script>
  </head>
  <body>
    <main>
      <section class="preview">
        <div id="previewFrame" class="preview-frame">
          <img id="preview" src="/preview.mjpg" alt="Podglad z detekcja obiektow" draggable="false" />
          <div id="roiLayer" class="roi-layer">
            <div id="roiBox" class="roi-box"></div>
            <div id="roiDraft" class="roi-box roi-draft"></div>
          </div>
        </div>
      </section>

      <aside>
        <section class="panel">
          <h2>Status</h2>
          <div class="status-grid">
            <div class="metric">
              <span class="label">Stan</span>
              <span id="monitorStatus" class="value">-</span>
            </div>
            <div class="metric">
              <span class="label">REC</span>
              <span id="recording" class="value">-</span>
            </div>
            <div class="metric">
              <span class="label">Pies / osoba</span>
              <span id="targetsVisible" class="value">-</span>
            </div>
            <div class="metric">
              <span class="label">FPS podglad / zapis</span>
              <span id="fpsInfo" class="value">-</span>
            </div>
            <div class="metric">
              <span class="label">Kamera / JPEG</span>
              <span id="cameraInfo" class="value">-</span>
            </div>
            <div class="metric">
              <span class="label">YOLO / det.</span>
              <span id="yoloInfo" class="value">-</span>
            </div>
            <div class="metric">
              <span class="label">Device / ROI</span>
              <span id="deviceInfo" class="value">-</span>
            </div>
            <div class="metric">
              <span class="label">Stream</span>
              <span id="streamSource" class="value compact">{{ default_stream }}</span>
            </div>
            <div class="metric">
              <span class="label">Model</span>
              <span id="modelName" class="value compact">-</span>
            </div>
          </div>
          <div class="roi-actions">
            <button id="roiEdit" type="button">ROI</button>
            <button id="roiSave" type="button" disabled>Zapisz ROI</button>
            <button id="roiClear" type="button">Wyczysc ROI</button>
            <button id="detectionOpen" type="button">Detekcja</button>
          </div>
          <form id="streamForm" class="stream-form">
            <input id="streamInput" type="text" name="stream_url" autocomplete="off" spellcheck="false" />
            <button id="streamSave" type="submit">Polacz</button>
          </form>
        </section>

        <section class="panel">
          <h2>Ostatnie zdarzenia</h2>
          <div id="events" class="events"></div>
        </section>
      </aside>
    </main>

    <div id="detectionModal" class="modal" hidden>
      <form id="detectionForm" class="modal-panel">
        <header class="modal-header">
          <h2>Detekcja</h2>
          <button id="detectionClose" type="button">Zamknij</button>
        </header>

        <section class="settings-section">
          <h3>Profil</h3>
          <label>
            <span>Profil</span>
            <select id="detectionProfile" name="profile">
              <option value="stable">Stabilny</option>
              <option value="sensitive">Czuly</option>
              <option value="max_detail">Max detal</option>
              <option value="custom">Custom</option>
            </select>
          </label>
        </section>

        <section class="settings-section">
          <h3>Model</h3>
          <label>
            <span>Model</span>
            <input id="modelPath" name="model_path" type="text" autocomplete="off" spellcheck="false" />
          </label>
          <label>
            <span>Device</span>
            <select id="yoloDevice" name="yolo_device">
              <option value="auto">auto</option>
              <option value="cpu">cpu</option>
              <option value="mps">mps</option>
              <option value="cuda">cuda</option>
            </select>
          </label>
        </section>

        <section class="settings-section">
          <h3>Progi</h3>
          <label>
            <span>Pies</span>
            <input id="dogConf" name="dog_conf" type="number" min="0.01" max="0.95" step="0.01" />
          </label>
          <label>
            <span>Osoba</span>
            <input id="personConf" name="person_conf" type="number" min="0.01" max="0.95" step="0.01" />
          </label>
        </section>

        <section class="settings-section">
          <h3>Obraz YOLO</h3>
          <label>
            <span>imgsz</span>
            <select id="yoloImgsz" name="yolo_imgsz">
              <option value="auto">auto</option>
              <option value="960">960</option>
              <option value="1280">1280</option>
              <option value="1536">1536</option>
            </select>
          </label>
          <label>
            <span>Szerokosc</span>
            <select id="detectWidth" name="detect_width">
              <option value="auto">auto</option>
              <option value="960">960</option>
              <option value="1280">1280</option>
              <option value="1536">1536</option>
            </select>
          </label>
        </section>

        <section class="settings-section">
          <h3>Czestotliwosc</h3>
          <label>
            <span>Spoczynek</span>
            <input id="idleDetectSeconds" name="idle_detect_seconds" type="number" min="0.2" max="30" step="0.05" />
          </label>
          <label>
            <span>Aktywnie</span>
            <input id="activeDetectSeconds" name="active_detect_seconds" type="number" min="0.1" max="10" step="0.05" />
          </label>
          <label>
            <span>Podtrzymanie</span>
            <input id="activeTrackSeconds" name="active_track_seconds" type="number" min="1" max="120" step="0.5" />
          </label>
        </section>

        <section class="settings-section">
          <h3>Nagrywanie</h3>
          <label>
            <span>Post-roll</span>
            <input id="postRollSeconds" name="post_roll_seconds" type="number" min="1" max="600" step="1" />
          </label>
          <label>
            <span>Min pies</span>
            <input id="minHitsDog" name="min_hits_dog" type="number" min="1" max="20" step="1" />
          </label>
          <label>
            <span>Min osoba</span>
            <input id="minHitsPerson" name="min_hits_person" type="number" min="1" max="20" step="1" />
          </label>
          <label>
            <span>FPS zapis</span>
            <select id="evidenceFps" name="evidence_fps">
              <option value="auto">auto</option>
              <option value="4">4</option>
              <option value="6">6</option>
              <option value="8">8</option>
              <option value="12">12</option>
              <option value="15">15</option>
            </select>
          </label>
          <label class="checkbox-row">
            <input id="triggerDog" type="checkbox" />
            <span>Trigger pies</span>
          </label>
          <label class="checkbox-row">
            <input id="triggerPerson" type="checkbox" />
            <span>Trigger osoba</span>
          </label>
        </section>

        <section class="settings-section">
          <h3>Podglad</h3>
          <label class="checkbox-row">
            <input id="previewEnabled" name="preview_enabled" type="checkbox" />
            <span>Podglad MJPEG</span>
          </label>
        </section>

        <footer class="modal-footer">
          <span id="detectionStatus" class="modal-status">-</span>
          <button id="detectionSave" type="submit">Zapisz</button>
        </footer>
      </form>
    </div>
  </body>
</html>
